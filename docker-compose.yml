services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-savestate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-savestate}
      POSTGRES_DB: ${POSTGRES_DB:-savestate}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-savestate}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    # Dev-only override: the Dockerfile's default CMD runs gunicorn (no
    # reload, no debugger) so real image builds are production-safe by
    # default. Local dev wants Flask's reloader/debugger instead.
    command: ["flask", "--app", "app", "run", "--host=0.0.0.0", "--port=5000", "--debug"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-savestate}:${POSTGRES_PASSWORD:-savestate}@db:5432/${POSTGRES_DB:-savestate}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      SMTP_HOST: ${SMTP_HOST:-mailpit}
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: ./backend
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app.celery", "worker", "--loglevel=info"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-savestate}:${POSTGRES_PASSWORD:-savestate}@db:5432/${POSTGRES_DB:-savestate}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      SMTP_HOST: ${SMTP_HOST:-mailpit}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Local-dev-only fake SMTP server + web inbox — lets emails (welcome,
  # password reset, password changed) be seen at http://localhost:8025
  # without needing real SMTP credentials. Point SMTP_HOST/PORT at a real
  # provider's relay in production instead.
  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
