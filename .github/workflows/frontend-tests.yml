name: Frontend Tests

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-tests.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-tests.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Node 20's bundled npm (10.x) resolves this project's optional nested
      # vite/esbuild peer dependency (pulled in transitively by vitest@4)
      # differently than npm 11.x does, which makes `npm ci` reject a
      # lockfile that npm 11 considers perfectly in sync. Pin to the npm
      # major used to generate package-lock.json so `ci` sees it consistently.
      - run: npm install -g npm@11

      - run: npm ci

      - run: npm run format:check

      - run: npm test

      - run: npm run test:coverage
